<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 预览</title>
    <link rel="icon" href="/ico.svg" type="image/svg+xml">
    <link rel="dns-prefetch" href="//zen.dev.mugua.team">
    <link rel="preconnect" href="https://zen.dev.mugua.team:8888" crossorigin>
    <script src="/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script type="module" src="/src/main.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-8 relative">

    <!-- ========== 左侧遮罩和 ========== -->
    <div id="sidebar-trigger" class="fixed left-0 top-0 w-6 h-screen z-[99]"></div>
    <div id="github-sidebar" class="fixed left-0 top-0 w-[12.5vw] h-screen bg-black z-[100] transition-transform duration-300 -translate-x-full text-white overflow-hidden shadow-2xl flex flex-col font-sans">
        <div class="p-4 border-b border-white/20 flex items-center bg-black z-10 shrink-0">
            <button id="sidebar-back-btn" class="hidden text-xs bg-white/20 hover:bg-white/30 px-2 py-1 rounded transition-colors whitespace-nowrap mr-3">&lt; 返回</button>
            <h3 id="sidebar-title" class="font-bold text-sm truncate flex-grow">项目列表</h3>
            <a id="sidebar-title-story-link" class="hidden ml-2 mr-1 shrink-0 w-7 h-7 rounded-md text-gray-400 hover:text-white hover:bg-white/10 flex items-center justify-center" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true">
                    <path d="M14 3h7v7m0-7L10 14M19 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h6"></path>
                </svg>
            </a>
            <div id="sidebar-scope-control" class="relative ml-2 text-sm shrink-0">
                <button id="sidebar-scope-trigger" type="button" class="sidebar-scope-trigger" aria-haspopup="true" aria-expanded="false">
                    <span id="sidebar-scope-label">全部</span>
                    <svg class="sidebar-scope-chevron w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="m6 9 6 6 6-6"></path>
                    </svg>
                </button>
                <div id="sidebar-scope-menu" class="hidden sidebar-scope-menu" role="menu" aria-label="项目范围">
                    <button type="button" class="sidebar-scope-btn sidebar-scope-btn-active" data-sidebar-scope="all" role="menuitem">全部</button>
                    <button type="button" class="sidebar-scope-btn" data-sidebar-scope="1" role="menuitem">1</button>
                    <button type="button" class="sidebar-scope-btn" data-sidebar-scope="2" role="menuitem">2</button>
                </div>
            </div>
        </div>
        <div id="sidebar-content" class="p-2 flex-grow overflow-y-auto relative">
            <div id="sidebar-loading" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-transparent z-20">
                <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                <span class="text-[12px] mt-2 text-gray-300">加载中...</span>
            </div>
            <ul id="sidebar-list" class="space-y-1"></ul>
        </div>
        <div class="p-3 border-t border-white/20 shrink-0 flex items-center justify-between gap-2">
            <button id="publish-token-settings-btn" type="button" class="text-xs text-white/75 hover:text-white transition-colors whitespace-nowrap">发布凭据</button>
            <span id="publish-token-status" class="text-[11px] text-white/40 whitespace-nowrap">未设置</span>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="bg-white w-[75vw] h-[85vh] rounded-xl shadow-lg flex flex-col overflow-hidden border border-gray-100">
        <!-- 主体内容区 -->
        <div class="flex-grow flex flex-col p-6 space-y-4 min-h-0">
            <!-- 编辑器 -->
            <div id="editor-container" class="transition-shadow focus-within:ring-2 focus-within:ring-blue-500">
                <div id="editor"></div>
            </div>

            <!-- 按钮区 -->
            <div class="flex items-center gap-4 pt-2 shrink-0">
                <!-- 消息提示区 -->
                <div id="status-message" class="hidden min-w-0 flex-1 truncate text-sm px-3 py-2 rounded-lg"></div>

                <div class="ml-auto flex items-center justify-end gap-4 shrink-0">
                    <button
                        id="publish-btn"
                        class="text-blue-600 hover:text-blue-800 text-sm font-medium transition-colors"
                    >
                        发布
                    </button>

                    <button
                        id="download-btn"
                        class="px-6 py-2.5 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 flex items-center"
                    >
                        下载
                    </button>

                    <button
                        id="preview-btn"
                        class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                    >
                        预览
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 下载配置弹窗 -->
    <div id="download-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-300">
            <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">下载</h2>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">文件名</label>
                    <div class="flex items-center">
                        <input type="text" id="download-filename" placeholder="请输入文件名，仅字母和数字" class="flex-grow p-2 border border-gray-300 rounded-l-lg focus:ring-2 focus:ring-blue-500 outline-none border-r-0 transition-all">
                        <span id="download-ext-label" class="bg-gray-100 border border-gray-300 border-l-0 rounded-r-lg px-3 py-2 text-gray-500 text-sm">.html</span>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-3">
                <button id="download-cancel" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">取消</button>
                <button id="download-confirm" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors shadow-md">确认下载</button>
            </div>
        </div>
    </div>

    <!-- 发布配置弹窗 -->
    <div id="publish-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-[40rem] overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-300">
            <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">发布</h2>
            </div>
                <div class="p-6 space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">提交密码</label>
                            <input type="password" id="publish-password" placeholder="********" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">文件名</label>
                            <div class="flex items-center">
                                <input type="text" id="file-name-input" placeholder="" class="flex-grow min-w-0 p-2 border border-gray-300 rounded-l-lg focus:ring-2 focus:ring-blue-500 outline-none border-r-0 transition-all">
                                <span id="publish-ext-label" class="bg-gray-100 border border-gray-300 border-l-0 rounded-r-lg px-3 py-2 text-gray-500 text-sm">.html</span>
                            </div>
                        </div>
                    </div>

                <!-- 项目选择 -->
                <div>
                    <div class="flex items-center gap-4 mb-3">
                        <label class="block text-sm font-medium text-gray-700">选择项目</label>
                        <button id="add-project-btn" class="text-xs text-green-600 hover:underline">新增项目</button>
                    </div>
                    <div id="project-container" class="flex flex-wrap gap-2 mb-3 p-1">
                        <span class="text-sm text-gray-400">正在获取项目列表...</span>
                    </div>
                </div>

                <!-- 新增项目输入 -->
                <div id="new-project-container" class="hidden grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">目录</label>
                        <input type="text" id="new-project-name" placeholder="仅限字母数字" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">名称</label>
                        <input type="text" id="new-project-summary" placeholder="显示在左侧列表里的名称" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 items-end">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="project-id-input">ID</label>
                        <input type="text" id="project-id-input" placeholder="用于关联禅道需求" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div class="h-[42px] flex items-center justify-between bg-gray-50 px-3 rounded-lg border border-gray-100">
                        <span class="text-sm font-medium text-gray-700">加密</span>
                        <label class="switch">
                            <input type="checkbox" id="encryption-switch" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-3">
                <button id="modal-cancel" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">取消</button>
                <button id="modal-confirm" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors shadow-md">发布</button>
            </div>
        </div>
    </div>

    <!-- 发布凭据弹窗 -->
    <div id="publish-token-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-300">
            <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">发布凭据</h2>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-sm font-medium text-gray-700">GitHub PAT</label>
                        <label class="flex items-center gap-1 text-xs text-gray-500">
                            <input type="checkbox" id="remember-publish-token" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                            记住
                        </label>
                    </div>
                    <input type="password" id="publish-token-input" placeholder="GitHub PAT" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-3">
                <button id="publish-token-cancel" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">取消</button>
                <button id="publish-token-confirm" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors shadow-md">提交</button>
            </div>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div id="share-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-300">
            <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">分享</h2>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex justify-center">
                    <div id="share-qr-canvas" class="w-56 h-56"></div>
                </div>
                <input type="text" id="share-link-input" readonly class="w-full p-2 text-xs border border-gray-300 rounded-lg bg-gray-50 text-gray-600 outline-none">
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-3">
                <button id="share-copy" class="px-4 py-2 text-blue-600 hover:text-blue-800 font-medium">复制链接</button>
                <button id="share-close" class="px-6 py-2 bg-gray-800 hover:bg-black text-white font-medium rounded-lg transition-colors shadow-md">关闭</button>
            </div>
        </div>
    </div>

    <!-- 弹窗内错误提示 -->
    <div id="modal-error-dialog" class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-[80] backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-red-100">
            <div class="bg-red-50 px-6 py-4 border-b border-red-100">
                <h2 class="text-lg font-semibold text-red-700">提示</h2>
            </div>
            <div class="px-6 py-5">
                <p id="modal-error-message" class="text-sm leading-6 text-gray-700"></p>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end">
                <button id="modal-error-close" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition-colors shadow-md">好的</button>
            </div>
        </div>
    </div>


</body>
</html>

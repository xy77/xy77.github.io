<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ico.svg" type="image/svg+xml">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>HTML 预览</title>
    <!-- 引入权限验证逻辑 -->
    <script src="auth.js"></script>
    <script>
        // 页面载入时立即执行检查
        if (typeof checkAuth === 'function') {
            checkAuth();
        }
    </script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入分享内容压缩和二维码生成 -->
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- 引入 Monaco Editor 加载器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        .folder-btn-active {
            border-color: #1890ff !important;
            background-color: #1890ff !important;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgba(24, 144, 255, 0.2);
        }
        /* 编辑器 */
        #editor-container {
            display: flex;
            background-color: #ffffff; 
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            overflow: hidden;
            position: relative;
            min-height: 0;
            flex-grow: 1;
        }
        /* Monaco Editor 容器样式 */
        #editor {
            width: 100%;
            height: 100%;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #1890ff;
        }
        input:focus + .slider {
            box-shadow: 0 0 1px #1890ff;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }
        /* 侧边栏滚动条样式 */
        #github-sidebar ::-webkit-scrollbar {
            width: 4px;
        }
        #github-sidebar ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .sidebar-scope-btn {
            padding: 0.18rem 0.45rem;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.2;
            transition: background-color 0.2s, color 0.2s;
            width: 3rem;
            text-align: center;
            white-space: nowrap;
        }
        .sidebar-scope-btn-active {
            background-color: #1890ff;
            color: white;
        }
        .sidebar-project-scope-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1rem;
            height: 1rem;
            border-radius: 9999px;
            background-color: rgba(24, 144, 255, 0.6);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            line-height: 1;
            flex-shrink: 0;
        }
        .sidebar-project-scope-badge-2 {
            background-color: rgba(18, 163, 74, 0.8);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-8 relative">

    <!-- ========== 左侧遮罩和 ========== -->
    <div id="sidebar-trigger" class="fixed left-0 top-0 w-6 h-screen z-[99]"></div>
    <div id="github-sidebar" class="fixed left-0 top-0 w-[12.5vw] h-screen bg-black z-[100] transition-transform duration-300 -translate-x-full text-white overflow-hidden shadow-2xl flex flex-col font-sans">
        <div class="p-4 border-b border-white/20 flex items-center bg-black z-10 shrink-0">
            <button id="sidebar-back-btn" class="hidden text-xs bg-white/20 hover:bg-white/30 px-2 py-1 rounded transition-colors whitespace-nowrap mr-3">&lt; 返回</button>
            <h3 id="sidebar-title" class="font-bold text-sm truncate flex-grow">项目列表</h3>
            <div id="sidebar-scope-control" class="ml-2 flex overflow-hidden rounded-md border border-white/20 text-sm shrink-0">
                <button type="button" class="sidebar-scope-btn sidebar-scope-btn-active" data-sidebar-scope="all">全部</button>
                <button type="button" class="sidebar-scope-btn border-l border-white/20" data-sidebar-scope="1">1</button>
                <button type="button" class="sidebar-scope-btn border-l border-white/20" data-sidebar-scope="2">2</button>
            </div>
        </div>
        <div id="sidebar-content" class="p-2 flex-grow overflow-y-auto relative">
            <div id="sidebar-loading" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-transparent z-20">
                <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                <span class="text-[12px] mt-2 text-gray-300">加载中...</span>
            </div>
            <ul id="sidebar-list" class="space-y-1"></ul>
        </div>
        <div class="p-3 border-t border-white/20 shrink-0 flex items-center justify-between gap-2">
            <button id="publish-token-settings-btn" type="button" class="text-xs text-white/75 hover:text-white transition-colors whitespace-nowrap">发布凭据</button>
            <span id="publish-token-status" class="text-[11px] text-white/40 whitespace-nowrap">未设置</span>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="bg-white w-[75vw] h-[85vh] rounded-xl shadow-lg flex flex-col overflow-hidden border border-gray-100">
        <!-- 主体内容区 -->
        <div class="flex-grow flex flex-col p-6 space-y-4 min-h-0">
            <!-- 编辑器 -->
            <div id="editor-container" class="transition-shadow focus-within:ring-2 focus-within:ring-blue-500">
                <div id="editor"></div>
            </div>

            <!-- 按钮区 -->
            <div class="flex items-center gap-4 pt-2 shrink-0">
                <!-- 消息提示区 -->
                <div id="status-message" class="hidden min-w-0 flex-1 truncate text-sm px-3 py-2 rounded-lg"></div>

                <div class="ml-auto flex items-center justify-end gap-4 shrink-0">
                    <button
                        id="publish-btn"
                        class="text-blue-600 hover:text-blue-800 text-sm font-medium transition-colors"

                        发布

                    <button
                        id="download-btn"
                        class="px-6 py-2.5 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 flex items-center"
                    >
                        下载
                    </button>

                    <button
                        id="preview-btn"
                        class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                    >
                        预览
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 下载配置弹窗 -->
    <div id="download-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-300">
            <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">下载</h2>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">文件名</label>
                    <div class="flex items-center">
                        <input type="text" id="download-filename" placeholder="请输入文件名，仅字母和数字" class="flex-grow p-2 border border-gray-300 rounded-l-lg focus:ring-2 focus:ring-blue-500 outline-none border-r-0 transition-all">
                        <span id="download-ext-label" class="bg-gray-100 border border-gray-300 border-l-0 rounded-r-lg px-3 py-2 text-gray-500 text-sm">.html</span>
                    </div>

            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-3">
                <button id="download-cancel" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">取消</button>
                <button id="download-confirm" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors shadow-md">确认下载</button>
            </div>
        </div>

    <!-- 发布配置弹窗 -->
    <div id="publish-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-300">
            <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">发布</h2>
            </div>
	            <div class="p-6 space-y-5">
	                <div>
	                    <label class="block text-sm font-medium text-gray-700 mb-1">提交密码</label>
	                    <input type="password" id="publish-password" placeholder="********" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
	                </div>

	                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">文件名</label>
                    <div class="flex items-center">
                        <input type="text" id="file-name-input" placeholder="" class="flex-grow p-2 border border-gray-300 rounded-l-lg focus:ring-2 focus:ring-blue-500 outline-none border-r-0 transition-all">
                        <span id="publish-ext-label" class="bg-gray-100 border border-gray-300 border-l-0 rounded-r-lg px-3 py-2 text-gray-500 text-sm">.html</span>
                    </div>
                </div>

                <!-- 项目选择 -->
                <div>
                    <div class="flex items-center gap-4 mb-3">
                        <label class="block text-sm font-medium text-gray-700">选择项目</label>
                        <button id="add-project-btn" class="text-xs text-green-600 hover:underline">新增项目</button>
                    </div>
                    <div id="project-container" class="flex flex-wrap gap-2 mb-3 max-h-[9rem] overflow-y-auto p-1">
                        <span class="text-sm text-gray-400">正在获取项目列表...</span>
                    </div>
                </div>

                <!-- 新增项目输入 -->
                <div id="new-project-container" class="hidden border-t pt-4 space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">目录</label>
                        <input type="text" id="new-project-name" placeholder="仅限字母数字" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">名称</label>
                        <input type="text" id="new-project-summary" placeholder="显示在左侧列表里的名称" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                </div>

                <!-- 加密开关 -->
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <span class="text-sm font-medium text-gray-700">加密</span>
                    <label class="switch">
                        <input type="checkbox" id="encryption-switch" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-3">
                <button id="modal-cancel" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">取消</button>
                <button id="modal-confirm" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors shadow-md">发布</button>
            </div>

    <!-- 发布凭据弹窗 -->
    <div id="publish-token-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-300">
            <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">发布凭据</h2>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-sm font-medium text-gray-700">GitHub PAT</label>
                        <label class="flex items-center gap-1 text-xs text-gray-500">
                            <input type="checkbox" id="remember-publish-token" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                            记住

            </div>

    <!-- 分享弹窗 -->
    <div id="share-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-300">
            <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">分享</h2>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex justify-center">
                    <div id="share-qr-canvas" class="w-56 h-56"></div>
                </div>
                <input type="text" id="share-link-input" readonly class="w-full p-2 text-xs border border-gray-300 rounded-lg bg-gray-50 text-gray-600 outline-none">
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-3">
                <button id="share-copy" class="px-4 py-2 text-blue-600 hover:text-blue-800 font-medium">复制链接</button>
                <button id="share-close" class="px-6 py-2 bg-gray-800 hover:bg-black text-white font-medium rounded-lg transition-colors shadow-md">关闭</button>
            </div>
        </div>
    </div>

    <!-- 弹窗内错误提示 -->
    <div id="modal-error-dialog" class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-[80] backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden border border-red-100">
            <div class="bg-red-50 px-6 py-4 border-b border-red-100">
                <h2 class="text-lg font-semibold text-red-700">提示</h2>
            </div>
            <div class="px-6 py-5">
                <p id="modal-error-message" class="text-sm leading-6 text-gray-700"></p>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end">
                <button id="modal-error-close" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition-colors shadow-md">好的</button>
            </div>
        </div>
    </div>

    <script>
        // 核心配置
        const config = {
            getToken: function() {
                return getPublishToken();
            },
            owner: 'xy77', 
            repo: 'zen', 
            publicBaseUrl: 'https://xy77.github.io',
            projectManifest: 'projects.json',
            branch: 'main' 
        };

        // 状态管理
        const secondaryRootFolder = '2';
        let folders = [];
        let selectedFolder = null;
        let selectedProjectKey = null;
        let isNewProjectMode = false;
        let sidebarScope = 'all';
        let publicProjectManifest = null;
        let editor = null;

        // 初始化 Monaco Editor 并引入官方中文支持
        require.config({ 
            paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' },
            'vs/nls': { availableLanguages: { '*': 'zh-cn' } }
        });
        require(['vs/editor/editor.main'], function() {
            // 从本地恢复内容
            const savedContent = localStorage.getItem('zen_editor_content') || '';
            
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: savedContent,
                language: 'html',
                theme: 'vs', // 浅色主题
                automaticLayout: true,
                minimap: { enabled: true }, // 默认开启缩略图
                wordWrap: 'off', // 默认关闭自动换行
                fontSize: 16,
                fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace',
                scrollBeyondLastLine: false,
                roundedSelection: true,
                renderWhitespace: "none"
            });

            // 缩略图状态
            const minimapEnabledKey = editor.createContextKey('minimapEnabled', true);
            const wordWrapEnabledKey = editor.createContextKey('wordWrapEnabled', false);

            editor.addAction({
                id: 'share-editor-content-cn',
                label: '分享',
                contextMenuGroupId: '0_custom_top',
                contextMenuOrder: -1,
                run: function() {
                    openShareModal();
                }
            });

            // 自动换行开关
            editor.addAction({
                id: 'enable-word-wrap-cn',
                label: '自动换行',
                contextMenuGroupId: '0_custom_top',
                contextMenuOrder: 0,
                precondition: '!wordWrapEnabled',
                run: function(ed) {
                    ed.updateOptions({ wordWrap: 'on' });
                    wordWrapEnabledKey.set(true);
                }
            });

            editor.addAction({
                id: 'disable-word-wrap-cn',
                label: '关闭自动换行',
                contextMenuGroupId: '0_custom_top',
                contextMenuOrder: 0,
                precondition: 'wordWrapEnabled',
                run: function(ed) {
                    ed.updateOptions({ wordWrap: 'off' });
                    wordWrapEnabledKey.set(false);
                }
            });

            // 隐藏缩略图
            editor.addAction({
                id: 'hide-minimap-cn',
                label: '隐藏缩略图',
                contextMenuGroupId: '0_custom_top',
                contextMenuOrder: 1,
                precondition: 'minimapEnabled',
                run: function(ed) {
                    ed.updateOptions({ minimap: { enabled: false } });
                    minimapEnabledKey.set(false);
                }
            });

            // 显示缩略图
            editor.addAction({
                id: 'show-minimap-cn',
                label: '显示缩略图',
                contextMenuGroupId: '0_custom_top',
                contextMenuOrder: 2,
                precondition: '!minimapEnabled',
                run: function(ed) {
                    ed.updateOptions({ minimap: { enabled: true } });
                    minimapEnabledKey.set(true);
                }
            });

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
                previewBtn.click();
            });
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyD, function() {
                downloadBtn.click();
            });

            // 监听键盘缩放事件
            window.addEventListener('keydown', function(e) {
                if (e.ctrlKey || e.metaKey) {
                    const currentSize = editor.getOption(monaco.editor.EditorOption.fontSize);
                    
                    if (e.key === '=' || e.key === '+') {
                        e.preventDefault();
                        // 限制最大字号为 44px
                        editor.updateOptions({ fontSize: Math.min(44, currentSize + 2) });
                    } 
                    else if (e.key === '-') {
                        e.preventDefault();
                        editor.updateOptions({ fontSize: Math.max(8, currentSize - 2) });
                    } 
                    else if (e.key === '0') {
                        e.preventDefault();
                        editor.updateOptions({ fontSize: 16 });
                    }
                }
            }, true);

            editor.addAction({
                id: 'clear-all-and-paste',
                label: '清空所有并粘贴',
                contextMenuGroupId: '0_custom_top',
                contextMenuOrder: 3, 
                run: async function(ed) {
                    try {
                        const text = await navigator.clipboard.readText();
                        ed.setValue(text || '');
                        localStorage.setItem('zen_editor_content', text || '');
                    } catch (err) {
                        ed.setValue('');
                        localStorage.setItem('zen_editor_content', '');
                        showMessage('无法直接访问剪贴板，已清空内容。请手动粘贴。', true);
                    }
                }
            });

            editor.addAction({
                id: 'clear-all-content',
                label: '清空所有',
                contextMenuGroupId: '0_custom_top',
                contextMenuOrder: 4,
                run: function(ed) {
                    ed.setValue('');
                    localStorage.setItem('zen_editor_content', '');
                }
            });
            
            // 监听编辑器内容变化并实时保存到 localStorage
            editor.onDidChangeModelContent(() => {
                const val = editor.getValue();
                localStorage.setItem('zen_editor_content', val);
                // 动态调整编辑器语言模式
                const type = detectType(val);
                if (type === 'markdown') {
                    monaco.editor.setModelLanguage(editor.getModel(), 'markdown');
                } else if (type === 'json') {
                    monaco.editor.setModelLanguage(editor.getModel(), 'json');
                } else {
                    monaco.editor.setModelLanguage(editor.getModel(), 'html');
                }
            });

            if (isShareLocation()) {
                loadShareContentFromLocation();
            }

            // 编辑器加载完成后初始化数据
            loadSidebarData('');
            editor.focus();

            // 初始化拖拽监听
            initDragAndDrop();
        });

        // 元素获取
        const previewBtn = document.getElementById('preview-btn');
        const publishBtn = document.getElementById('publish-btn');
        const downloadBtn = document.getElementById('download-btn');
        const statusMessage = document.getElementById('status-message');

        const publishModal = document.getElementById('publish-modal');
        const publishPassword = document.getElementById('publish-password');
        const publishTokenModal = document.getElementById('publish-token-modal');
        const publishTokenSettingsBtn = document.getElementById('publish-token-settings-btn');
        const publishTokenStatus = document.getElementById('publish-token-status');
        const publishTokenInput = document.getElementById('publish-token-input');
        const rememberPublishToken = document.getElementById('remember-publish-token');
        const publishTokenCancel = document.getElementById('publish-token-cancel');
        const publishTokenConfirm = document.getElementById('publish-token-confirm');
        const projectContainer = document.getElementById('project-container');
        const addProjectBtn = document.getElementById('add-project-btn');
        const newProjectContainer = document.getElementById('new-project-container');
        const newProjectName = document.getElementById('new-project-name');
        const newProjectSummary = document.getElementById('new-project-summary'); 
        const encryptionSwitch = document.getElementById('encryption-switch');
        const fileNameInput = document.getElementById('file-name-input');
        const modalCancel = document.getElementById('modal-cancel');
        const modalConfirm = document.getElementById('modal-confirm');
        const publishExtLabel = document.getElementById('publish-ext-label');

        // 下载相关元素
        const downloadModal = document.getElementById('download-modal');
        const downloadFilename = document.getElementById('download-filename');
        const downloadCancel = document.getElementById('download-cancel');
        const downloadConfirm = document.getElementById('download-confirm');
        const downloadExtLabel = document.getElementById('download-ext-label');
        const modalErrorDialog = document.getElementById('modal-error-dialog');
        const modalErrorMessage = document.getElementById('modal-error-message');
        const modalErrorClose = document.getElementById('modal-error-close');
        const shareModal = document.getElementById('share-modal');
        const shareQrCanvas = document.getElementById('share-qr-canvas');
        const shareLinkInput = document.getElementById('share-link-input');
        const shareCopy = document.getElementById('share-copy');
        const shareClose = document.getElementById('share-close');

        // 重构内容类型检测，使 JSON 始终高亮错误
        function detectType(content) {
            const trimmed = content.trim();
            if (!trimmed) return 'html';
            
            // 如果是以 { 或 [ 开头，则强制识别为 JSON，以便 Monaco 进行语法高亮和错误提示
            if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
                return 'json';
            }

            if (trimmed.includes('<html') || trimmed.includes('<!DOCTYPE')) return 'html';
            if (isReactCode(trimmed)) return 'react';
            
            return 'markdown';
        }

        function isReactCode(content) {
            const hasReactImport = /(?:import|from)\s+[^;\n]*['"](?:react|react-dom\/client|lucide-react)['"]/.test(content);
            const hasDefaultExport = /\bexport\s+default\b/.test(content);
            const hasComponentDeclaration = /\b(?:function|class|const|let|var)\s+[A-Z][A-Za-z0-9_$]*\b/.test(content);
            const hasJsx = /<[A-Za-z][A-Za-z0-9_.:-]*(?:\s|>|\/)/.test(content);
            return hasReactImport || hasDefaultExport || (hasComponentDeclaration && hasJsx);
        }

        function getReactComponentName(content) {
            const namedDefault = content.match(/\bexport\s+default\s+(?:async\s+)?(?:function|class)\s+([A-Z][A-Za-z0-9_$]*)\b/);
            if (namedDefault) return namedDefault[1];

            const declaredComponent = content.match(/\b(?:function|class|const|let|var)\s+(App|[A-Z][A-Za-z0-9_$]*)\b/);
            if (declaredComponent) return declaredComponent[1];

            const defaultIdentifier = content.match(/\bexport\s+default\s+([A-Z][A-Za-z0-9_$]*)\s*;?\s*$/m);
            if (defaultIdentifier) return defaultIdentifier[1];

            return 'App';
        }

        function getReactPreviewSource(content) {
            if (/\bexport\s+default\b/.test(content)) return content;
            if (/\b(?:createRoot|ReactDOM\.render)\s*\(/.test(content)) return content;
            return `${content.trim()}\n\nexport default ${getReactComponentName(content)};`;
        }

        function toInlineScriptString(value) {
            return JSON.stringify(value).replace(/<\/script/gi, '<\\/script');
        }

        // 获取编辑器内容的辅助函数
        function getFullCode() {
            return editor ? editor.getValue() : '';
        }

        const shareHash = '#s';
        const shareDirectory = 'share';
        const shareIdBytes = 12;
        const shareKeyBytes = 32;
        const sharePagesPollAttempts = 90;
        const sharePagesPollDelayMs = 2000;

        function isShareLocation() {
            const hash = window.location.hash;
            return hash === shareHash || hash.startsWith(`${shareHash}?`) || hash.startsWith(`${shareHash}&`);
        }

        function isSafeShareId(id) {
            return /^[A-Za-z0-9_-]{8,64}$/.test(id);
        }

        function isSafeShareRef(ref) {
            return /^[0-9a-f]{40}$/i.test(ref);
        }

        function isSafeShareKey(key) {
            return /^[A-Za-z0-9_-]{32,96}$/.test(key);
        }

        function getShareParamsFromLocation() {
            if (!isShareLocation()) return null;

            const query = window.location.hash.slice(shareHash.length).replace(/^[?&]/, '');
            const params = new URLSearchParams(query);
            const id = params.get('id') || '';
            const ref = params.get('ref') || '';
            const key = params.get('k') || '';

            if (!id || !ref || !key) throw new Error('分享链接无效');
            if (!isSafeShareId(id) || !isSafeShareRef(ref) || !isSafeShareKey(key)) {
                throw new Error('分享链接参数无效');
            }

            return { id, ref, key };
        }

        function getShareFilePath(id) {
            if (!isSafeShareId(id)) throw new Error('分享 ID 无效');
            return `${shareDirectory}/${id}.json`;
        }

        function encodeGitHubPath(path) {
            return path.split('/').map(encodeURIComponent).join('/');
        }

        function getShareUrl(id, ref, key) {
            const params = new URLSearchParams({ id, ref, k: key });
            return `${config.publicBaseUrl}/index.html${shareHash}?${params.toString()}`;
        }

        function bytesToBase64(bytes) {
            let binary = '';
            const chunkSize = 0x8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
            }
            return btoa(binary);
        }

        function bytesToBase64Url(bytes) {
            return bytesToBase64(bytes)
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/g, '');
        }

        function base64ToBytes(value) {
            const binary = atob(value);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
            return bytes;
        }

        function base64UrlToBytes(value) {
            const normalized = String(value || '').replace(/-/g, '+').replace(/_/g, '/');
            const padded = normalized + '='.repeat((4 - (normalized.length % 4)) % 4);
            return base64ToBytes(padded);
        }

        function createRandomToken(byteLength) {
            return bytesToBase64Url(crypto.getRandomValues(new Uint8Array(byteLength)));
        }

        async function importShareKey(keyText, usages) {
            const keyBytes = base64UrlToBytes(keyText);
            if (keyBytes.length !== shareKeyBytes) throw new Error('分享密钥无效');
            return crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, usages);
        }

        async function encryptShareText(text, keyText) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await importShareKey(keyText, ['encrypt']);
            const encrypted = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv },
                key,
                new TextEncoder().encode(text)
            );
            return {
                iv: bytesToBase64(iv),
                data: bytesToBase64(new Uint8Array(encrypted))
            };
        }

        async function decryptShareText(payload, keyText) {
            const iv = base64ToBytes(payload.iv || '');
            const data = base64ToBytes(payload.data || '');
            const key = await importShareKey(keyText, ['decrypt']);
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
            return new TextDecoder().decode(decrypted);
        }

        async function createSharePayload(content, id, key) {
            if (typeof LZString === 'undefined') {
                throw new Error('分享组件加载失败，请刷新后重试');
            }

            const compressed = LZString.compressToEncodedURIComponent(content);
            const encrypted = await encryptShareText(compressed, key);
            return {
                id,
                version: Date.now(),
                updatedAt: new Date().toISOString(),
                encoding: 'lz-string-uri',
                encryption: 'aes-256-gcm-url-key',
                ...encrypted
            };
        }

        async function decodeSharePayload(payload, key) {
            if (!payload || !payload.data) throw new Error('分享内容还未生成');
            const compressed = await decryptShareText(payload, key);
            const content = LZString.decompressFromEncodedURIComponent(compressed);
            if (typeof content !== 'string') throw new Error('分享内容解析失败');
            return content;
        }

        function encodeGitHubContent(value) {
            return bytesToBase64(new TextEncoder().encode(value));
        }

        function decodeGitHubContent(value) {
            return new TextDecoder().decode(base64ToBytes(String(value || '').replace(/\s/g, '')));
        }

        async function readGitHubError(res) {
            try {
                const data = await res.json();
                return data && data.message ? data.message : '';
            } catch (e) {
                return '';
            }
        }

        function formatPrivateShareWriteError(status, detail) {
            const githubDetail = detail ? `（GitHub：${detail}）` : '';
            if (status === 401) {
                return `发布凭据无效或已过期，请重新填写${githubDetail}`;
            }
            if (status === 403 || status === 404) {
                return `发布凭据已填写，但没有写入 zen 仓库的权限。请给 token 增加 zen 仓库 Contents 读写权限${githubDetail}`;
            }
            if (status === 409) {
                return `分享文件写入冲突，请重新点击分享${githubDetail}`;
            }
            if (status === 422) {
                return `分享文件写入参数无效或文件已存在，请重新点击分享${githubDetail}`;
            }
            return `同步分享内容失败：HTTP ${status}${githubDetail}`;
        }

        function formatShareReadError(status, detail) {
            const githubDetail = detail ? `（GitHub：${detail}）` : '';
            if (status === 404) return `分享内容不存在或已被删除${githubDetail}`;
            if (status === 403) return `读取分享内容受限，请确认 zen 仓库可公开读取${githubDetail}`;
            return `读取分享内容失败：HTTP ${status}${githubDetail}`;
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function createShareReadError(status, detail) {
            const err = new Error(formatShareReadError(status, detail));
            err.status = status;
            return err;
        }

        async function fetchSharePayloadFromApi(id, ref) {
            const path = getShareFilePath(id);
            const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${encodeGitHubPath(path)}?ref=${encodeURIComponent(ref)}&t=${Date.now()}`;
            const res = await fetch(url, {
                headers: { 'Accept': 'application/vnd.github+json' },
                cache: 'no-store'
            });

            if (!res.ok) {
                throw createShareReadError(res.status, await readGitHubError(res));
            }

            const data = await res.json();
            if (!data || !data.content) throw new Error('分享内容为空');
            return JSON.parse(decodeGitHubContent(data.content));
        }

        async function fetchSharePayloadFromPages(id) {
            const res = await fetch(`${config.publicBaseUrl}/${getShareFilePath(id)}?t=${Date.now()}`, {
                cache: 'no-store'
            });

            if (!res.ok) {
                throw createShareReadError(res.status, '');
            }

            return await res.json();
        }

        async function fetchSharePayload(id, ref) {
            try {
                return await fetchSharePayloadFromApi(id, ref);
            } catch (apiError) {
                if (![403, 404].includes(apiError.status)) throw apiError;
            }

            showMessage('正在等待分享内容同步...');
            for (let attempt = 0; attempt < sharePagesPollAttempts; attempt += 1) {
                try {
                    return await fetchSharePayloadFromPages(id);
                } catch (pagesError) {
                    if (![403, 404].includes(pagesError.status)) throw pagesError;
                    await wait(sharePagesPollDelayMs);
                }
            }

            throw new Error('分享内容同步超时，请稍后重新扫码');
        }

        async function loadShareContentFromLocation() {
            showMessage('正在读取分享内容...');

            try {
                const params = getShareParamsFromLocation();
                const payload = await fetchSharePayload(params.id, params.ref);
                const content = await decodeSharePayload(payload, params.key);
                editor.setValue(content);
                localStorage.setItem('zen_editor_content', content);
                window.history.replaceState(null, document.title, window.location.pathname + window.location.search);
                showMessage('分享内容已载入');
            } catch (e) {
                showMessage(e.message || '分享内容载入失败', true);
            }
        }

        async function createPrivateShareFile(path, payload) {
            const token = getPublishToken();
            if (!token) throw new Error('请先设置发布凭据');

            const putRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${encodeGitHubPath(path)}`, {
                method: 'PUT',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `share: add ${path}`,
                    content: encodeGitHubContent(JSON.stringify(payload, null, 2)),
                    branch: config.branch
                })
            });

            if (!putRes.ok) {
                throw new Error(formatPrivateShareWriteError(putRes.status, await readGitHubError(putRes)));
            }

            const data = await putRes.json();
            const commitSha = data && data.commit && data.commit.sha;
            if (!commitSha) throw new Error('分享文件已写入，但未获取到提交版本');
            return commitSha;
        }

        async function openShareModal() {
            const content = getFullCode();
            if (!content.trim()) return showMessage('内容为空', true);
            if (typeof QRCode === 'undefined') {
                return showMessage('二维码组件加载失败，请刷新后重试', true);
            }

            let shareUrl = '';
            try {
                showMessage('正在生成分享内容...');
                const shareId = createRandomToken(shareIdBytes);
                const shareKey = createRandomToken(shareKeyBytes);
                const payload = await createSharePayload(content, shareId, shareKey);
                const commitSha = await createPrivateShareFile(getShareFilePath(shareId), payload);
                shareUrl = getShareUrl(shareId, commitSha, shareKey);
            } catch (e) {
                return showMessage(e.message || '分享失败', true);
            }

            shareLinkInput.value = shareUrl;
            shareQrCanvas.innerHTML = '';

            try {
                new QRCode(shareQrCanvas, {
                    text: shareUrl,
                    width: 224,
                    height: 224,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
                shareModal.classList.replace('hidden', 'flex');
                showMessage('分享内容已生成');
            } catch (e) {
                showMessage('二维码生成失败', true);
            }
        }

        function closeShareModal() {
            shareModal.classList.replace('flex', 'hidden');
        }

        // --- 核心交互逻辑 ---
        function isDialogPageOpen() {
            return !publishModal.classList.contains('hidden') || !downloadModal.classList.contains('hidden') || !publishTokenModal.classList.contains('hidden') || !shareModal.classList.contains('hidden');
        }

        function showModalError(text) {
            modalErrorMessage.textContent = text;
            modalErrorDialog.classList.replace('hidden', 'flex');
            setTimeout(() => modalErrorClose.focus(), 0);
        }

        function hideModalError() {
            modalErrorDialog.classList.replace('flex', 'hidden');
        }

        modalErrorClose.onclick = hideModalError;
        modalErrorDialog.onclick = (e) => {
            if (e.target === modalErrorDialog) hideModalError();
        };

        shareClose.onclick = closeShareModal;
        shareModal.onclick = (e) => {
            if (e.target === shareModal) closeShareModal();
        };
        shareCopy.onclick = async () => {
            const link = shareLinkInput.value;
            if (!link) return;

            try {
                await navigator.clipboard.writeText(link);
                showMessage('链接已复制');
            } catch (e) {
                shareLinkInput.select();
                document.execCommand('copy');
                showMessage('链接已复制');
            }
        };

        const publishTokenLocalKey = 'zen_publish_token';
        const publishTokenSessionKey = 'zen_publish_token_session';

        function getStoredPublishToken() {
            return sessionStorage.getItem(publishTokenSessionKey) || localStorage.getItem(publishTokenLocalKey) || '';
        }

        function getPublishToken() {
            return getStoredPublishToken();
        }

        function savePublishToken() {
            const token = publishTokenInput.value.trim();
            if (!token) return '';

            if (rememberPublishToken.checked) {
                localStorage.setItem(publishTokenLocalKey, token);
                sessionStorage.removeItem(publishTokenSessionKey);
            } else {
                sessionStorage.setItem(publishTokenSessionKey, token);
                localStorage.removeItem(publishTokenLocalKey);
            }

            return token;
        }

        function loadPublishTokenState() {
            const localToken = localStorage.getItem(publishTokenLocalKey) || '';
            const sessionToken = sessionStorage.getItem(publishTokenSessionKey) || '';
            publishTokenInput.value = sessionToken || localToken;
            rememberPublishToken.checked = !!localToken && !sessionToken;
            updatePublishTokenStatus();
        }

        function updatePublishTokenStatus() {
            const hasToken = !!getStoredPublishToken();
            publishTokenStatus.textContent = hasToken ? '已设置' : '未设置';
            publishTokenStatus.classList.toggle('text-blue-300', hasToken);
            publishTokenStatus.classList.toggle('text-white/40', !hasToken);
        }

        function getShanghaiDateParts() {
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Shanghai',
                month: 'numeric',
                day: 'numeric'
            }).formatToParts(new Date());
            return {
                month: parts.find(part => part.type === 'month').value,
                day: parts.find(part => part.type === 'day').value
            };
        }

        function showMessage(text, isError = false) {
            if (isError && isDialogPageOpen()) {
                showModalError(text);
                return;
            }

            statusMessage.textContent = text;
            statusMessage.className = `min-w-0 flex-1 truncate text-sm px-3 py-2 rounded-lg ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            statusMessage.classList.remove('hidden');
            setTimeout(() => statusMessage.classList.add('hidden'), 6000);
        }

        // 获取编辑器内容并智能转换为预览用 HTML 的辅助函数
        function getFormattedCode() {
            let content = getFullCode();
            const type = detectType(content);

            if (type === 'react') {
                const reactSource = getReactPreviewSource(content);
                return `<!DOCTYPE html>

            } else if (type === 'markdown') {

        // 初始化拖拽文件功能
        function initDragAndDrop() {
            const dropZone = window;
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
            dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); });

                    reader.readAsText(file);
                }
            });

        // 预览按钮逻辑 (如果格式错误则提示)

            const type = detectType(content);
            
            if (type === 'json') {
                try {
                    const obj = JSON.parse(content);
                    const formatted = JSON.stringify(obj, null, 4);
                    editor.setValue(formatted);
                    showMessage('JSON 已格式化');

        function getRootSidebarCacheKey(scope = sidebarScope) {
            return `__root_projects__:${scope}`;
        }

        function getSidebarCacheKey(path) {
            return path === '' ? getRootSidebarCacheKey() : path;
        }

        const hiddenProjectDirectoryNames = new Set(['temp', '.github', 'share']);
        const hiddenSidebarDirectoryNames = new Set(['.github', 'share']);
        const hiddenSidebarFileExtensions = new Set(['webp', 'png', 'jpg', 'jpeg', 'bmp', 'heic', 'gif']);

        function getFileExtension(name) {
            const index = name.lastIndexOf('.');
            return index === -1 ? '' : name.slice(index + 1).toLowerCase();
        }

        function isVisibleProjectDirectory(item) {
            return item.type === 'dir' && !hiddenProjectDirectoryNames.has(item.name);
        }

        function isRootProjectDirectory(item) {
            return isVisibleProjectDirectory(item) && item.name !== secondaryRootFolder;
        }

        function isVisibleSidebarItem(item) {
            if (item.name === '_summary.txt' || item.name === '.DS_Store') return false;
            if (item.type === 'dir') return !hiddenSidebarDirectoryNames.has(item.name);
            if (item.type === 'file') return !hiddenSidebarFileExtensions.has(getFileExtension(item.name));
            return true;
        }

        async function fetchPublicProjectManifest() {
            if (publicProjectManifest) return publicProjectManifest;

            const res = await fetch(`${config.publicBaseUrl}/${config.projectManifest}?t=${Date.now()}`, {
                cache: 'no-store'
            });
            if (!res.ok) {
                throw new Error('请先设置发布凭据，或等待公开项目索引部署完成');
            }
            publicProjectManifest = await res.json();
            return publicProjectManifest;
        }

        async function fetchPublicManifestContents(path) {
            const manifest = await fetchPublicProjectManifest();
            const key = path || '';
            const items = manifest.tree && manifest.tree[key] ? manifest.tree[key] : [];
            return items.map(item => ({ ...item }));
        }

        async function fetchGithubContents(path) {
            const token = config.getToken();
            if (!token) return await fetchPublicManifestContents(path);
            const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}?t=${Date.now()}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error('读取目录失败');
            return await res.json();
        }

        async function addProjectItemDetails(items) {
            const itemsWithDetails = await Promise.all(items.map(async (item) => {
                const dateStr = item.date || await fetchPathCommitDate(item.path);
                let summary = item.summary || item.name;
                if (item.type === 'dir' && !item.summary) {
                    const fetchedSummary = await fetchFolderSummary(item.path);
                    if (fetchedSummary) summary = fetchedSummary;
                }
                return {
                    ...item,
                    key: item.key || `${item.projectScope || '1'}:${item.name}`,
                    publishName: item.publishName || item.name,
                    date: dateStr || '1970-01-01T00:00:00Z',
                    summary: summary
                };
            }));

            itemsWithDetails.sort((a, b) => new Date(b.date) - new Date(a.date));
            return itemsWithDetails;
        }

        async function fetchRootProjectItems(scope = 'all') {
            const rootData = await fetchGithubContents('');
            let targetItems = [];

            if (scope !== '2') {
                targetItems = targetItems.concat(
                    rootData
                        .filter(isRootProjectDirectory)
                        .map(item => ({
                            ...item,
                            projectScope: '1',
                            publishName: item.name,
                            key: `1:${item.name}`
                        }))
                );
            }

            if (scope !== '1') {
                const secondRoot = rootData.find(item => item.type === 'dir' && item.name === secondaryRootFolder);
                if (secondRoot) {
                    const secondData = await fetchGithubContents(secondaryRootFolder);
                    targetItems = targetItems.concat(
                        secondData
                            .filter(isVisibleProjectDirectory)
                            .map(item => ({
                                ...item,
                                projectScope: '2',
                                publishName: item.name,
                                key: `2:${item.name}`,
                                parentPathOverride: ''
                            }))
                    );
                }
            }

            return await addProjectItemDetails(targetItems);
        }

        function toPublishFolder(item) {
            return {
                name: item.publishName || item.name,
                path: item.path,
                summary: item.summary || item.name,
                date: item.date,
                key: item.key || `${item.projectScope || '1'}:${item.name}`,
                projectScope: item.projectScope || '1'
            };
        }

        async function fetchFolders() {
            try {
                const cachedAllProjects = sidebarCache[getRootSidebarCacheKey('all')];
                if (cachedAllProjects && cachedAllProjects.length > 0) {
                    folders = cachedAllProjects.map(toPublishFolder);
                    renderProjectButtons(10);
                    return;
                }

                projectContainer.innerHTML = '<span class="text-sm text-gray-400">正在获取项目详情...</span>';
                const itemsWithDetails = await fetchRootProjectItems('all');
                sidebarCache[getRootSidebarCacheKey('all')] = itemsWithDetails;
                folders = itemsWithDetails.map(toPublishFolder);
                renderProjectButtons(10);
            } catch (err) {
                projectContainer.innerHTML = `<span class="text-sm text-red-500">${err.message || '无法连接到 GitHub'}</span>`;
            }
        }

        function renderProjectButtons(limit = 10) {
            projectContainer.innerHTML = '';
            const list = limit ? folders.slice(0, limit) : folders;
            list.forEach(f => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1.5 text-sm border border-gray-200 rounded-md bg-white hover:border-blue-400 transition-all ${selectedProjectKey === f.key && !isNewProjectMode ? 'folder-btn-active' : ''}`;
                btn.textContent = f.summary;
                btn.onclick = () => {
                    selectedFolder = f.name;
                    selectedProjectKey = f.key;
                    isNewProjectMode = false;
                    newProjectContainer.classList.add('hidden');
                    renderProjectButtons(limit);
                };
                projectContainer.appendChild(btn);
            });
            
            if (limit && folders.length > limit) {
                const moreBtn = document.createElement('button');
                moreBtn.className = "px-3 py-1.5 text-sm border-gray-300 text-blue-600 rounded-md bg-white hover:border-blue-400 transition-all";
                moreBtn.textContent = "查看更多";
                moreBtn.onclick = (e) => {
                    e.preventDefault();
                    renderProjectButtons(null);
                };
                projectContainer.appendChild(moreBtn);
            }
        }

        // 下载按钮默认后缀
        downloadBtn.onclick = () => {
            const content = getFullCode();
            if (!content.trim()) return showMessage('不能为空', true);
            
            const type = detectType(content);
            let ext = '.html';
            if (type === 'markdown') ext = '.md';
            else if (type === 'json') ext = '.json';
            
            downloadExtLabel.textContent = ext;
            
            downloadModal.classList.replace('hidden', 'flex');
            setTimeout(() => downloadFilename.focus(), 100);
        };

        downloadCancel.onclick = () => {
            downloadModal.classList.replace('flex', 'hidden');
            downloadFilename.value = '';
        };

        downloadConfirm.onclick = () => {
            const content = getFullCode();
            const type = detectType(content);
            
            let ext = '.html';
            if (type === 'markdown') ext = '.md';
            else if (type === 'json') ext = '.json';

            const name = downloadFilename.value.trim().replace(/[^a-zA-Z0-9.+\-]/g, '') || 'index';
            const finalName = name + ext;
            
            const finalContent = (type === 'markdown' || type === 'json') ? content : getFormattedCode(); 
            
            try {
                let mimeType = 'text/html';
                if (type === 'markdown') mimeType = 'text/markdown';
                else if (type === 'json') mimeType = 'application/json';

                const blob = new Blob([finalContent], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = finalName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                downloadModal.classList.replace('flex', 'hidden');
                downloadFilename.value = '';
                showMessage(`正在下载：${finalName}`);
            } catch (e) {
                showMessage('下载失败', true);
            }
        };

        publishBtn.onclick = () => {
            const content = getFullCode();
            if (!content.trim()) return showMessage('不能为空', true);
            
            const type = detectType(content);
            let ext = '.html';
            if (type === 'markdown') ext = '.md';
            else if (type === 'json') ext = '.json';

            publishExtLabel.textContent = ext;

            publishModal.classList.replace('hidden', 'flex');
            updatePublishTokenStatus();
            publishPassword.value = ''; 
            fetchFolders();
            setTimeout(() => publishPassword.focus(), 100);
        };

        function openPublishTokenModal() {
            hideModalError();
            loadPublishTokenState();
            publishTokenModal.classList.replace('hidden', 'flex');
            setTimeout(() => publishTokenInput.focus(), 100);
        }

        function closePublishTokenModal() {
            publishTokenModal.classList.replace('flex', 'hidden');
        }

        publishTokenSettingsBtn.onclick = openPublishTokenModal;
        publishTokenCancel.onclick = closePublishTokenModal;
        publishTokenModal.onclick = (e) => {
            if (e.target === publishTokenModal) closePublishTokenModal();
        };

        publishTokenConfirm.onclick = () => {
            const token = savePublishToken();
            if (!token) return showMessage('请填写发布凭据', true);

            closePublishTokenModal();
            publicProjectManifest = null;
            sidebarCache = {};
            updatePublishTokenStatus();
            if (!publishModal.classList.contains('hidden')) fetchFolders();
            loadSidebarData('');
            showMessage('发布凭据已保存');
        };

        publishTokenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') publishTokenConfirm.click();
        });

        updatePublishTokenStatus();

        addProjectBtn.onclick = () => {
            isNewProjectMode = true;
            selectedFolder = null;
            selectedProjectKey = null;
            newProjectContainer.classList.remove('hidden');
            newProjectSummary.value = ''; 
            renderProjectButtons(10);
            newProjectName.focus();
        };

        modalCancel.onclick = () => {
            publishModal.classList.replace('flex', 'hidden');
            fileNameInput.value = '';
        };

        modalConfirm.onclick = async () => {
            const inputPass = publishPassword.value.trim();
            const { month, day } = getShanghaiDateParts();
            const datePassword = day + day;
            const monthDayPassword = `${month}${day}`;
            const publishScope = inputPass === datePassword ? '1' : (inputPass === monthDayPassword ? '2' : null);
            
            if (!publishScope) {
                return showMessage('密码错误', true);
            }

            const token = getPublishToken();
            if (!token) {
                return showMessage('请先设置发布凭据', true);
            }
            const folderName = isNewProjectMode ? newProjectName.value.trim() : selectedFolder;
            const selectedFolderMeta = folders.find(f => f.key === selectedProjectKey);
            const fileName = fileNameInput.value.trim().replace(/[^a-zA-Z0-9.+\-]/g, '');

            if (!folderName || !fileName) return showMessage('请确保目录名和文件名完整', true);
            if (!isNewProjectMode && selectedFolderMeta && selectedFolderMeta.projectScope !== publishScope) {
                return showMessage('密码与项目不匹配，请重新选择项目', true);
            }
            const folder = publishScope === '2' ? `${secondaryRootFolder}/${folderName}` : folderName;

            const content = getFullCode();
            const type = detectType(content);
            
            let ext = '.html';
            if (type === 'markdown') ext = '.md';
            else if (type === 'json') ext = '.json';
            
            let rawContent = (type === 'markdown' || type === 'json') ? content : getFormattedCode(); 
            
            if (type !== 'markdown' && type !== 'json' && rawContent.includes('<title>')) {
                const assetPrefix = publishScope === '2' ? '../../' : '../';
                let injectCode = `\n\t<link rel="icon" href="${assetPrefix}ico.svg" type="image/svg+xml">`;
                if (encryptionSwitch.checked) {
                    injectCode += `\n<!-- 引入权限验证逻辑 -->\n\t<script src="${assetPrefix}auth.js"><\/script>\n\t<script>\n\t\t// 页面载入时立即执行检查\n\t\tif (typeof checkAuth === 'function') {\n\t\t\tcheckAuth();\n\t\t}\n\t<\/script>`;
                }
                rawContent = rawContent.replace(/(<title>.*?<\/title>)/i, `$1${injectCode}`);
            }

            const path = `${folder}/${fileName}${ext}`;

            publishModal.classList.replace('flex', 'hidden');
            publishBtn.disabled = true;
            showMessage('正在推送...');

            try {
                if (isNewProjectMode) {
                    const summaryText = newProjectSummary.value.trim();
                    if (summaryText) {
                        const summaryPath = `${folder}/_summary.txt`;
                        try {
                            await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${summaryPath}`, {
                                method: 'PUT',
                                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    message: `add summary for ${folder}`,
                                    content: btoa(unescape(encodeURIComponent(summaryText))),
                                    branch: config.branch
                                })
                            });
                        } catch (err) { console.warn('保存摘要失败', err); }
                    }
                }

                let sha = null;
                const getRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}?ref=${config.branch}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (getRes.ok) sha = (await getRes.json()).sha;

                const putRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `deploy: ${path}`,
                        content: btoa(unescape(encodeURIComponent(rawContent))),
                        sha: sha,
                        branch: config.branch
                    })
                });

                if (putRes.ok) {
                    const url = `${config.publicBaseUrl}/${path}`;
                    const el = document.createElement("textarea"); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                    showMessage(`发布成功！已复制链接：${url}`);
                    fileNameInput.value = '';
                } else throw new Error('推送失败，请检查仓库权限');
            } catch (e) {
                showMessage(e.message, true);
            } finally {
                publishBtn.disabled = false;
                fileNameInput.value = '';
            }
        };

        // ================== 左侧目录树遮罩交互逻辑 ==================
        const domSidebarTrigger = document.getElementById('sidebar-trigger');
        const domGithubSidebar = document.getElementById('github-sidebar');
        const domSidebarList = document.getElementById('sidebar-list');
        const domSidebarTitle = document.getElementById('sidebar-title');
        const domSidebarBackBtn = document.getElementById('sidebar-back-btn');
        const domSidebarLoading = document.getElementById('sidebar-loading');
        const domSidebarScopeControl = document.getElementById('sidebar-scope-control');
        const domSidebarScopeBtns = Array.from(document.querySelectorAll('[data-sidebar-scope]'));

        let sidebarHideTimer = null;
        let sidebarCache = {}; 
        let pathNameMap = { '': '项目列表' }; 
        let pathParentMap = {};

        function renderSidebarScopeControl() {
            domSidebarScopeBtns.forEach(btn => {
                btn.classList.toggle('sidebar-scope-btn-active', btn.dataset.sidebarScope === sidebarScope);
            });
        }

        domSidebarScopeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const nextScope = btn.dataset.sidebarScope;
                if (nextScope === sidebarScope) return;
                sidebarScope = nextScope;
                renderSidebarScopeControl();
                loadSidebarData('');
            });
        });

        domSidebarTrigger.addEventListener('mouseenter', () => {
            clearTimeout(sidebarHideTimer);
            domGithubSidebar.classList.remove('-translate-x-full');
        });

        domGithubSidebar.addEventListener('mouseenter', () => { clearTimeout(sidebarHideTimer); });

        domGithubSidebar.addEventListener('mouseleave', () => {
            sidebarHideTimer = setTimeout(() => {
                domGithubSidebar.classList.add('-translate-x-full');
            }, 1000);
        });

        async function fetchPathCommitDate(path) {
            const token = config.getToken();
            if (!token) return null;
            try {
                const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/commits?path=${path}&per_page=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) return null;
                const data = await res.json();
                return data && data.length > 0 ? data[0].commit.committer.date : null;
            } catch (e) { return null; }
        }

        async function fetchFolderSummary(path) {
            const token = config.getToken();
            if (!token) return null;
            try {
                const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}/_summary.txt?ref=${config.branch}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) return null;
                const data = await res.json();
                return data && data.content ? decodeURIComponent(escape(atob(data.content))) : null;
            } catch (e) { return null; }
        }

        async function loadSidebarData(path, customTitle = null) {
            domSidebarLoading.classList.remove('hidden');
            domSidebarList.innerHTML = '';
            domSidebarTitle.textContent = customTitle || pathNameMap[path] || (path === '' ? '项目列表' : path.split('/').pop());
            domSidebarScopeControl.classList.toggle('hidden', path !== '');
            
            if (path === '') { domSidebarBackBtn.classList.add('hidden'); } 
            else {
                domSidebarBackBtn.classList.remove('hidden');
                domSidebarBackBtn.onclick = () => {
                    const parentPath = Object.prototype.hasOwnProperty.call(pathParentMap, path)
                        ? pathParentMap[path]
                        : path.split('/').slice(0, -1).join('/');
                    loadSidebarData(parentPath, pathNameMap[parentPath]);
                };
            }

            const cacheKey = getSidebarCacheKey(path);
            if (sidebarCache[cacheKey]) {
                renderSidebarList(sidebarCache[cacheKey]);
                domSidebarLoading.classList.add('hidden');
                return;
            }

            try {
                if (path === '') {
                    const rootItems = await fetchRootProjectItems(sidebarScope);
                    sidebarCache[cacheKey] = rootItems;
                    renderSidebarList(rootItems);
                    return;
                }

                const data = await fetchGithubContents(path);
                const targetItems = data.filter(isVisibleSidebarItem);

                const itemsWithDetails = await addProjectItemDetails(targetItems);
                sidebarCache[cacheKey] = itemsWithDetails;
                renderSidebarList(itemsWithDetails);
            } catch (e) {
                domSidebarList.innerHTML = `<li class="text-red-400 text-xs p-2 text-center mt-4">${e.message || '获取失败'}</li>`;
            } finally {
                domSidebarLoading.classList.add('hidden');
            }
        }

        function renderSidebarList(items) {
            domSidebarList.innerHTML = '';
            if (items.length === 0) {
                domSidebarList.innerHTML = `<li class="text-gray-400 text-xs p-2 text-center mt-4">空目录</li>`;
                return;
            }
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'p-2 hover:bg-white/10 rounded cursor-pointer transition-colors flex flex-col group';
                const formattedDate = item.date !== '1970-01-01T00:00:00Z' 
                    ? new Date(item.date).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' })
                    : '未知时间';
                const icon = item.type === 'dir' ? '📁' : '📄';
                const displayName = item.type === 'dir' ? (item.summary || item.name) : item.name;
                const scopeBadge = sidebarScope === 'all' && item.type === 'dir' && ['1', '2'].includes(item.projectScope)
                    ? `<span class="sidebar-project-scope-badge sidebar-project-scope-badge-${item.projectScope}">${item.projectScope}</span>`
                    : '';
                if (item.type === 'dir') pathNameMap[item.path] = displayName;
                if (item.parentPathOverride !== undefined) pathParentMap[item.path] = item.parentPathOverride;
                
                li.innerHTML = `<div class="flex items-center space-x-2 w-full"><span class="text-sm shrink-0">${icon}</span><div class="flex items-center gap-1 min-w-0"><span class="text-[13px] truncate text-gray-200 group-hover:text-white" title="${displayName}">${displayName}</span>${scopeBadge}</div></div><div class="text-[10px] text-gray-500 group-hover:text-gray-300 mt-1 ml-6 truncate">${formattedDate}</div>`;
                
                if (item.type === 'dir') {
                    li.onclick = () => loadSidebarData(item.path, displayName);
                } else {
                    li.onclick = () => {
                        const fileUrl = `${config.publicBaseUrl}/${item.path}`;
                        const el = document.createElement("textarea"); el.value = fileUrl; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                        showMessage(`已复制链接：${fileUrl}`);
                        window.open(fileUrl, '_blank');
                    };
                }
                domSidebarList.appendChild(li);
            });
        }
    </script>

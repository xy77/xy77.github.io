<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证</title>
    <link rel="icon" href="/ico.svg" type="image/svg+xml">
    <script src="/auth.js"></script>
    <script type="module" src="/src/auth-page.js"></script>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-xs">
        <!-- 仅保留输入框，启用自动聚焦 -->
        <input 
            type="password" 
            id="auth-password" 
            autofocus
            class="w-full p-4 text-center border-b-2 border-gray-300 bg-transparent text-xl outline-none focus:border-blue-500 transition-all font-mono"
        >
        <!-- 隐藏的错误提示占位，保持 UI 简洁 -->
        <p id="error-msg" class="text-red-500 text-sm text-center mt-2 opacity-0 transition-opacity"></p>
    </div>

</body>
</html>
